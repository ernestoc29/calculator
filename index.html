<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title">Calculator</h1>
    <div class="calc-body">
        <div class="display">
            <p class="problem">problem</p>
            <p class="solution">solution</p>
        </div>
        <div class="calc-btns">
            <button class="btn function" id="delete">Delete</button>
            <button class="btn function" id="clear">AC</button>
            <button class="btn function" id="percent">%</button>
            <button class="btn operation" id="divide">÷</button>
            <button class="btn number" id="7">7</button>
            <button class="btn number" id="8">8</button>
            <button class="btn number" id="9">9</button>
            <button class="btn operation" id="multiply">X</button>
            <button class="btn number" id="4">4</button>
            <button class="btn number" id="5">5</button>
            <button class="btn number" id="6">6</button>
            <button class="btn operation" id="minus">-</button>
            <button class="btn number" id="1">1</button>
            <button class="btn number" id="2">2</button>
            <button class="btn number" id="3">3</button>
            <button class="btn operation" id="plus">+</button>
            <button class="btn" id="signs">+/-</button>
            <button class="btn number" id="0">0</button>
            <button class="btn operation" id="decimal">.</button>
            <button class="btn operation" id="equals">=</button>
        </div>
    </div>
</body>
<script src="./script.js"></script>
</html>
