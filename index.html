<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <h1 class="title">Calculator</h1>
    <div class="calc-body">
        <div class="display">
            <div class="problem"></div>
            <div class="solution"></div>
        </div>
        <div class="num-btns">
            <button class="function" id="delete">Delete</button>
            <button class="function" id="clear">AC</button>
            <button class="function" id="percent">%</button>
            <button class="operation" id="divide">÷</button>
            <button class="number" id="7">7</button>
            <button class="number" id="8">8</button>
            <button class="number" id="9">9</button>
            <button class="operation" id="multiply">X</button>
            <button class="number" id="4">4</button>
            <button class="number" id="5">5</button>
            <button class="number" id="6">6</button>
            <button class="operation" id="minus">-</button>
            <button class="number" id="1">1</button>
            <button class="number" id="2">2</button>
            <button class="number" id="3">3</button>
            <button class="operation" id="plus">+</button>
            <button class="number" id="negative">+/-</button>
            <button class="number" id="0">0</button>
            <button class="operation" id="decimal">.</button>
            <button class="operation" id="equals">=</button>
        </div>
    </div>
</body>
</html>
